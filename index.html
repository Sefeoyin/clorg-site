<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Clorg</title>
  <meta name="description" content="See it on you first. AI closet organizer and virtual try-on.">
  <link rel="icon" type="image/svg+xml" href="logo.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #FEFBF9; color: #282828; font-family: 'DM Sans', sans-serif; line-height: 1.6; }
    main { max-width: 720px; margin: 0 auto; padding: 96px 20px 80px; text-align: center; min-height: 80vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    img.logo { width: 88px; height: 88px; margin-bottom: 16px; }
    h1 { font-family: 'Playfair Display', serif; font-weight: 500; font-size: 44px; margin-bottom: 12px; }
    p.tagline { font-size: 17px; color: #3A3633; margin-bottom: 36px; }
    .links { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; margin-bottom: 40px; }
    .links a { display: inline-block; padding: 12px 24px; border-radius: 28px; text-decoration: none; font-weight: 500; font-size: 15px; }
    .links a.primary { background: #282828; color: #FFFFFF; }
    .links a.secondary { background: #FFFFFF; color: #282828; border: 1px solid #EDE6DF; }
    .contact { font-size: 14px; color: #9A938C; }
    .contact a { color: #D8A570; }
  </style>
</head>
<body>
  <main>
    <img class="logo" src="logo.svg" alt="Clorg logo">
    <h1>Clorg</h1>
    <p class="tagline">See it on you first. AI closet organizer and virtual try-on.</p>
    <div class="links">
      <a class="primary" href="privacy.html">Privacy Policy</a>
      <a class="secondary" href="terms.html">Terms of Service</a>
    </div>
    <p class="contact">Support: <a href="mailto:support@clorg.app">support@clorg.app</a></p>
  </main>
</body>
</html>
